<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket 聊天室</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; background: #1a1a2e; color: #eee; display: flex; height: 100vh; }
#sidebar { width: 200px; background: #16213e; padding: 16px; }
#sidebar h3 { color: #e94560; margin-bottom: 12px; }
#online-list { list-style: none; font-size: 14px; }
#main { flex: 1; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; padding: 16px; }
#messages .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; background: #16213e; }
#messages .msg .user { color: #e94560; font-weight: bold; }
#messages .msg.system { text-align: center; color: #888; background: transparent; font-size: 13px; }
#input-area { display: flex; padding: 12px; background: #16213e; }
#input { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #1a1a2e; color: #eee; }
#send { margin-left: 8px; padding: 10px 20px; background: #e94560; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
<div id="sidebar">
  <h3>💬 在线用户</h3>
  <ul id="online-list"></ul>
</div>
<div id="main">
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" placeholder="输入消息..." autofocus>
    <button id="send">发送</button>
  </div>
</div>
<script>
const username = prompt('请输入昵称:', '游客' + Math.floor(Math.random()*1000)) || '匿名';
const room = '公共大厅';
const ws = new WebSocket(`ws://${location.host}/ws?username=${encodeURIComponent(username)}&room=${encodeURIComponent(room)}`);
const msgs = document.getElementById('messages');
const input = document.getElementById('input');

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  const div = document.createElement('div');
  div.className = 'msg';
  if (msg.type === 'system' || msg.type === 'join' || msg.type === 'leave') {
    div.className += ' system';
  }
  div.innerHTML = msg.type === 'message' 
    ? `<span class="user">${msg.username}:</span> ${msg.content}`
    : msg.content || `${msg.username} ${msg.type === 'join' ? '加入' : '离开'}了聊天室`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
};

document.getElementById('send').onclick = () => {
  if (input.value.trim()) { ws.send(input.value); input.value = ''; }
};
input.onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('send').click(); };
</script>
</body>
</html>
