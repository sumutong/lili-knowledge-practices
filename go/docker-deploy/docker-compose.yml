version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-docker-app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - APP_VERSION=1.0.0
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
